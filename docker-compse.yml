version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: airbyte
      POSTGRES_PASSWORD: airbyte
      POSTGRES_DB: weather_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airbyte:
    image: airbyte/airbyte:latest
    container_name: airbyte
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data: